<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      IMPORTANT: No og:, twitter:, or duplicate <title> tags here.
      - Bots (Googlebot, WhatsApp, etc.) are routed to /meta/* by the
        Cloudflare Worker and get fully-rendered HTML from the backend.
      - Real users get this shell, and react-helmet-async injects the
        correct per-page tags at runtime.
      This file is the React app shell ONLY.
    -->

    <!-- Default title & description — Helmet overrides these per page -->
    <title>Mango People News — News for Every Indian</title>
    <meta name="description"
          content="India's financial and business news platform. Markets, economy, policy and more. News for Every Indian." />

    <!-- Tell Google to index and follow — Helmet overrides this on noIndex pages -->
    <meta name="robots" content="index, follow" />

    <!-- Icons & PWA manifest -->
    <link rel="icon"             type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon"                  href="/logo.png" />
    <meta name="theme-color"          content="#C8820A" />
    <meta name="msapplication-TileColor" content="#C8820A" />

    <!-- API backend — preconnect saves DNS + TCP + TLS on first fetch -->
    <link rel="preconnect" href="https://api.mangopeoplenews.com" />

    <!-- Fonts — non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap"
      />
    </noscript>

    <!-- Organization JSON-LD (static, site-wide — stays here, not in Helmet) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "Mango People News",
      "alternateName": "MPN",
      "url": "https://www.mangopeoplenews.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.mangopeoplenews.com/logo.png"
      },
      "sameAs": [],
      "description": "India's financial and business news platform. News for Every Indian."
    }
    </script>

    <!-- WebSite + SearchAction structured data (Sitelink search box in SERPs) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mango People News",
      "url": "https://www.mangopeoplenews.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.mangopeoplenews.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Google AdSense -->
    <script async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9442958982270576"
      crossorigin="anonymous"></script>

    <!-- Google Publisher Center (Subscribe with Google) -->
    <script async type="application/javascript"
      src="https://news.google.com/swg/js/v1/swg-basic.js"></script>
    <script>
      (self.SWG_BASIC = self.SWG_BASIC || []).push(basicSubscriptions => {
        basicSubscriptions.init({
          type: "NewsArticle",
          isPartOfType: ["Product"],
          isPartOfProductId: "CAowsrbGDA:openaccess",
          clientOptions: { theme: "light", lang: "en" },
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
